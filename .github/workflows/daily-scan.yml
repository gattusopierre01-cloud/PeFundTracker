name: Daily fund scan

on:
  schedule:
    - cron: "0 6 * * 1-5"     # 06:00 UTC, Mon–Fri (≈07:00 London / 08:00 CET)
  workflow_dispatch: {}        # manual "Run workflow" button for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install feedparser gspread google-auth
      - name: Run the scan
        working-directory: monitoring_tool
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scan_job.py
